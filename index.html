<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Habit Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="viewport-container">
        
        <div class="main-layout">
            
            <aside class="avatar-column">
                <div class="speech-bubble">
                    <p id="sarcasm-text">Ah, resolveu aparecer? Achei que tivesse desistido ontem.</p>
                </div>
                <div class="avatar-frame">
                    <img id="avatar-img" src="img/avatar_normal.png" alt="Avatar">
                </div>
            </aside>

            <section class="dashboard-wrapper">
                <header class="top-bar">
                    <h1 id="month-display" class="medieval-font">MAY</h1>
                </header>

                <main class="dashboard-panel">
                    <div class="calendar-side">
                        <div id="calendar-grid"></div>
                    </div>

                    <div class="checklist-side">
                        <div class="checklist-card">
                            <h2 id="day-label" class="medieval-font">Day 11</h2>
                            <p class="consistency">Consistency: <span id="progress-val">0%</span></p>
                            
                            <div id="task-list" class="inner-scroll"></div>

                            <div class="add-task-row">
                                <input type="text" id="new-task-input" placeholder="New quest...">
                                <button id="add-btn">ADD</button>
                            </div>
                        </div>
                    </div>
                </main>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
